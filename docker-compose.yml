services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: effigent
      POSTGRES_PASSWORD: effigent
      POSTGRES_DB: effigent
    ports:
      - "5433:5432"
    volumes:
      - effigent-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U effigent"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  effigent-pgdata:
