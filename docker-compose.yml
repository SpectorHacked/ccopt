services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ccopt
      POSTGRES_PASSWORD: ccopt
      POSTGRES_DB: ccopt
    ports:
      - "5433:5432"
    volumes:
      - ccopt-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccopt"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ccopt-pgdata:
