# Render blueprint — deploys the effigent server on the free plan.
# Pair with: Neon (free Postgres → DATABASE_URL) and Cloudflare R2 (free 10GB
# S3-compatible blobs → CCOPT_S3_*). Free instances sleep after idle; the first
# request after sleep takes ~30-60s — acceptable for periodic sync + reports.
services:
  - type: web
    name: effigent
    runtime: docker
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: "8787"
      - key: DATABASE_URL
        sync: false # paste your Neon connection string (with ?sslmode=require)
      - key: CCOPT_ADMIN_TOKEN
        generateValue: true
      - key: CCOPT_PUBLIC_BASE_URL
        sync: false # https://<your-service>.onrender.com
      - key: CCOPT_S3_BUCKET
        sync: false # e.g. effigent-blobs (R2 bucket name)
      - key: CCOPT_S3_ENDPOINT
        sync: false # https://<account-id>.r2.cloudflarestorage.com
      - key: CCOPT_S3_ACCESS_KEY_ID
        sync: false
      - key: CCOPT_S3_SECRET_ACCESS_KEY
        sync: false
      - key: CCOPT_S3_REGION
        value: auto
