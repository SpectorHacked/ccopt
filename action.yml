# effigent as a reusable GitHub Action — wrap ANY Claude-based agent command:
#
#   - uses: effigent/effigent@main
#     with:
#       agent: dev-teammate:acme/api
#       command: pnpm --filter @moonshot/cli exec tsx src/run.ts --repo acme/api --requirement "…"
#       server: https://effigent.yourcompany.com
#       api-key: ${{ secrets.EFFIGENT_API_KEY }}
#
# Requires Node 20+ on the runner (ubuntu-latest has it) and env-based Claude
# auth for the wrapped agent (ANTHROPIC_API_KEY / Bedrock / Vertex).
name: 'effigent run'
description: 'Capture, attribute, and upload Claude agent runs for waste analysis'
branding:
  icon: 'activity'
  color: 'purple'

inputs:
  agent:
    description: 'Logical agent id (e.g. dev-teammate:acme/api)'
    required: true
  command:
    description: 'The agent command to run'
    required: true
  server:
    description: 'effigent server base URL (omit for capture-only)'
    required: false
    default: ''
  api-key:
    description: 'effigent tenant API key'
    required: false
    default: ''
  isolated:
    description: 'Run with a private CLAUDE_CONFIG_DIR (exact attribution; needs env auth)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Run agent under effigent
      shell: bash
      env:
        EFFIGENT_SERVER: ${{ inputs.server }}
        EFFIGENT_API_KEY: ${{ inputs.api-key }}
      run: |
        ISOLATED_FLAG=""
        if [ "${{ inputs.isolated }}" = "true" ]; then ISOLATED_FLAG="--isolated"; fi
        node "${{ github.action_path }}/dist/effigent.cjs" run \
          --agent "${{ inputs.agent }}" $ISOLATED_FLAG -- \
          bash -lc '${{ inputs.command }}'
